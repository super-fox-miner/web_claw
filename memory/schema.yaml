# 规则文件 YAML 头规范

# 必需字段
domain:
  type: string
  description: 规则所属领域（code/document/data）
  required: true

topic:
  type: string
  description: 规则所属主题（style/format/processing）
  required: true

created_at:
  type: datetime
  description: 创建时间
  required: true

updated_at:
  type: datetime
  description: 最后更新时间
  required: true

references:
  type: integer
  description: 引用次数
  required: true
  default: 0

activation:
  type: float
  description: 激活值（0-1）
  required: true
  default: 0.5

# 可选字段
author:
  type: string
  description: 规则创建者
  required: false

priority:
  type: string
  description: 优先级（high/medium/low）
  required: false
  default: medium

related_tools:
  type: array
  description: 相关工具列表
  required: false
  items:
    type: string

tags:
  type: array
  description: 标签列表
  required: false
  items:
    type: string