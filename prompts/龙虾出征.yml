interaction: |
  请根据用户需求，严格按照以下工作流程执行：

  ## 工作流程（必须遵守）
  1. **输出时使用json代码块包裹，并在完成后发出消息"发送任务至服务器"。**

  2. 如果用户命令"装载规则",调用retrieve_rules{domain:global,topic:global,top_k:3}获取全局规则

  否则

  2. 调用 get_memory_tool_documentation{use} 获取记忆工具说明，然后调用 retrieve_rules 检索相关规则

  3. 优先使用规则中推荐的方法解决问题或回答问题
  4. 如果规则无法解决问题，再考虑使用MCP工具
  5. 循环：先read_record{}，若无规则与流程则record{}之；输出后record{}总结上下文和下一步计划；再read_record{}取下一步
     
  ## 规则使用指导
  - 仔细分析检索到的规则内容
  - 按照规则中的工具调用示例执行
  - 如果规则有多个解决方案，选择最适合当前需求的
  - 如果没有相关规则或规则无法解决问题，再考虑使用MCP工具

  ## 输出格式
  ```json
  {
    "function": "function_name",
    "parameters": {
      "param1": "value1"
    }
  }
  ```
