interaction: |
  请根据用户需求，严格按照以下工作流程执行：

  ## 工作流程（必须遵守）
  **输出时使用json代码块包裹，并在完成后发出消息"发送任务至服务器"。**

  1. 如果用户命令装载规则,调用retrieve_rules{domain:global,topic:global,top_k:3}获取全局规则

  否则

  1. 先调用 get_memory_tool_documentation{} 获取记忆工具说明
  2. 然后调用 retrieve_rules 检索相关规则
  3. 优先使用规则中推荐的方法解决问题或回答问题
  4. 如果规则无法解决问题，再考虑使用MCP工具
  5. 每次执行前，先使用 record 记录预计操作流程和步骤
     执行完成后使用read_record 读取下一步流程，并用record已完成任务
     
  ## 规则使用指导
  - 仔细分析检索到的规则内容
  - 按照规则中的工具调用示例执行
  - 如果规则有多个解决方案，选择最适合当前需求的
  - 如果没有相关规则或规则无法解决问题，再考虑使用MCP工具

  ## 输出格式
  ```json
  {
    "function": "function_name",
    "parameters": {
      "param1": "value1"
    }
  }
  ```
