# 工具映射配置
inline_tools:
  - name: send_mcp_tool_documentation
    description: 获取MCP工具的说明文档
    parameters:
      tool_name: string
    
  # 记忆系统工具
  - name: get_memory_tool_documentation
    description: 获取记忆工具的说明文档
    parameters: {}
    
  - name: query_memory
    description: 基于用户需求查询相关规则
    parameters:
      query: string
      top_k: number
      filters: object
    
  - name: add_rule
    description: 添加新规则
    parameters:
      rule_name: string
      content: string
      domain: string
      tags: array
    
  - name: delete_rule
    description: 删除规则
    parameters:
      rule_id: string
    
  - name: record
    description: 记录任务进度
    parameters:
      task_chain: string
      current_task: string
      next_task: string

  - name: help
    description: 帮助函数，输出指定代码片段
    parameters: {}

mcp_tools: []
